name: Päivitä XMLTV-opas

on:
  schedule:
    # Ajetaan joka aamu klo 04:00 UTC (Suomen aikaa klo 07:00)
    - cron: '0 4 * * *'
  workflow_dispatch: # Mahdollistaa testiajon käynnistämisen käsin GitHubin kautta

permissions:
  contents: write # Tarvitaan, jotta action voi puskea päivitetyn tiedoston takaisin

jobs:
  update-xml:
    runs-on: ubuntu-latest

    steps:
    - name: Tsekkaa koodi ulos repositoriosta
      uses: actions/checkout@v4

    - name: Asenna XMLTV-työkalut yhdistämistä varten
      run: |
        sudo apt-get update
        sudo apt-get install -y xmltv-util

    - name: Lataa, pura ja yhdistä Open-EPG-lähteet
      run: |
        curl -sL "https://www.open-epg.com/files/finland2.xml.gz" | zcat > f2.xml
        curl -sL "https://www.open-epg.com/files/finland3.xml.gz" | zcat > f3.xml
        curl -sL "https://www.open-epg.com/files/unitedkingdom.xml.gz" | zcat > uk.xml

        # Yhdistetään ensin Suomen lähteet keskenään
        tv_merge -i f2.xml -m f3.xml -o t1.xml
        
        # Yhdistetään UK-lähteet mukaan lopulliseen oppaaseen
        tv_merge -i t1.xml -m uk.xml -o opas.xml

        # Siivotaan väliaikaiset tiedostot pois
        rm f2.xml f3.xml uk.xml t1.xml

    - name: Commit ja Push muutokset
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if git status --porcelain | grep -q "opas.xml"; then
          git add opas.xml
          git commit -m "Automaattinen EPG päivitys: $(date +'%Y-%m-%d %H:%M')"
          git push
        else
          echo "Ei muutoksia XMLTV-datassa."
        fi
